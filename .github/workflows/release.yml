name: SmartLMS Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release-build:
    name: Build Release Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: smartlms-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: smartlms-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartlms-backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('smartlms-backend/Cargo.lock') }}

      - name: Build release binary
        working-directory: smartlms-backend
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp smartlms-backend/target/${{ matrix.target }}/release/smartlms-backend \
             dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
          tar -czf dist/${{ matrix.name }}.tar.gz -C dist ${{ matrix.name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  docker-publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: release-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./smartlms-backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartlms-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/smartlms-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: ./smartlms-ml
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartlms-ml:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/smartlms-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-build, docker-publish]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.tar.gz
          generate_release_notes: true
          body: |
            ## SmartLMS Engine ${{ github.ref_name }}

            ### Installation
            See [deployment guide](./DEPLOYMENT.md) for full instructions.

            #### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/smartlms-api:${{ github.ref_name }}
            docker-compose up -d
            ```

            #### Linux binary
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/smartlms-linux-x86_64.tar.gz | tar xz
            chmod +x smartlms-linux-x86_64
            ./smartlms-linux-x86_64 --config /etc/smartlms/smartlms.toml
            ```
