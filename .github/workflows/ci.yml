name: SmartLMS CI

on:
  push:
    branches: [main, develop, "twill/**", "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust backend ────────────────────────────────────────────────────────────
  rust-check:
    name: Rust — Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartlms-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartlms-backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smartlms-backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo check
        run: cargo check --all-targets

  rust-test:
    name: Rust — Test
    runs-on: ubuntu-latest
    needs: rust-check
    defaults:
      run:
        working-directory: smartlms-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartlms
          POSTGRES_PASSWORD: smartlms_test
          POSTGRES_DB: smartlms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://smartlms:smartlms_test@localhost:5432/smartlms_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_not_for_production

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartlms-backend/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('smartlms-backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --all-targets -- --test-threads=4

      - name: cargo audit (security)
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  rust-build:
    name: Rust — Release Build
    runs-on: ubuntu-latest
    needs: rust-test
    defaults:
      run:
        working-directory: smartlms-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartlms-backend/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('smartlms-backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build --release
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlms-api
          path: smartlms-backend/target/release/smartlms-backend
          retention-days: 7

  # ── TypeScript Frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartlms-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartlms-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0
        continue-on-error: true  # lint warnings don't block, errors do

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlms-frontend
          path: smartlms-frontend/dist
          retention-days: 7

  # ── Julia ML Engine ──────────────────────────────────────────────────────────
  julia-test:
    name: Julia ML — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartlms-ml

    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.9'

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-${{ hashFiles('smartlms-ml/Project.toml') }}
          restore-keys: ${{ runner.os }}-julia-

      - name: Install Julia dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
        continue-on-error: true  # Julia tests are optional until full test suite exists

      - name: Syntax check all model files
        run: |
          for f in src/models/*.jl; do
            julia --project=. -e "include(\"$f\"); println(\"✓ $f\")" || exit 1
          done

  # ── TypeScript SDK ───────────────────────────────────────────────────────────
  sdk:
    name: SDK — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartlms-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartlms-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [rust-build, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./smartlms-backend
          push: false
          tags: smartlms/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./smartlms-ml
          push: false
          tags: smartlms/ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── All checks passed ────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [rust-check, rust-test, frontend, julia-test, sdk]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.rust-check.result }}" == "failure" || \
                "${{ needs.rust-test.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed."
