# SmartLMS Prometheus Configuration
# Metrics collection and monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'smartlms'
    environment: 'production'

# Alerting configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # SmartLMS Backend API
  - job_name: 'smartlms-api'
    scrape_interval: 30s
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'smartlms-api'
          component: 'backend'
    metrics_path: '/metrics'

  # SmartLMS ML Service
  - job_name: 'smartlms-ml'
    scrape_interval: 30s
    static_configs:
      - targets: ['ml:8081']
        labels:
          service: 'smartlms-ml'
          component: 'ml'
    metrics_path: '/metrics'

  # Node Exporter for system metrics (if running)
  - job_name: 'node'
    scrape_interval: 60s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # Redis metrics (if redis-exporter running)
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # PostgreSQL metrics (if postgres-exporter running)
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'