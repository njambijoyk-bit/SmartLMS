# Grafana Dashboards Provisioning Configuration

apiVersion: 1

providers:
  - name: 'SmartLMS Dashboards'
    orgId: 1
    folder: 'SmartLMS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true