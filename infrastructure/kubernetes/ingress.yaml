---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartlms-ingress
  namespace: smartlms
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - api.smartlms.example.com
    - admin.smartlms.example.com
    secretName: smartlms-tls
  rules:
  - host: api.smartlms.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartlms-api
            port:
              number: 80
  - host: admin.smartlms.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartlms-admin
            port:
              number: 80
---
# TLS Certificate (using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: smartlms-tls
  namespace: smartlms
spec:
  secretName: smartlms-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.smartlms.example.com
  - admin.smartlms.example.com
---
# ConfigMap for application config
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartlms-config
  namespace: smartlms
data:
  redis-url: "redis://redis:6379"
  app-domain: "smartlms.example.com"
  max-upload-size: "50m"
---
# Secrets (should be created via sealed-secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: smartlms-secrets
  namespace: smartlms
type: Opaque
stringData:
  database-url: "postgres://smartlms:password@postgres-master:5432/smartlms_master"
  jwt-secret: "change-me-in-production-use-strong-secret"
  postgres-password: "change-me-in-production"
---
# NetworkPolicy for API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smartlms-api-network-policy
  namespace: smartlms
spec:
  podSelector:
    matchLabels:
      app: smartlms-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: smartlms
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres-master
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}